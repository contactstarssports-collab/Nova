<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA | Teacher System 2026</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #050507; --panel: #111116; --user-blue: #007aff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--panel); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        #settings-menu { display: none; position: absolute; top: 60px; right: 20px; background: #1a1a20; padding: 15px; border-radius: 8px; z-index: 100; border: 1px solid #333; }
        
        #screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; padding-bottom: 120px; }
        .bubble { padding: 14px 18px; border-radius: 15px; max-width: 85%; line-height: 1.6; font-size: 16px; position: relative; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .nova { background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--cyan); align-self: flex-start; color: #e0faff; }
        .user { background: var(--user-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .speak-btn { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 10px; display: inline-block; }
        .rtl { direction: rtl; text-align: right; border-left: none; border-right: 4px solid var(--cyan); }

        #input-area { background: #0c0c0f; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        input { flex: 1; background: #16161a; border: 1px solid #333; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }
        button#send { background: var(--cyan); border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <span style="color:var(--cyan); font-weight:bold; letter-spacing:2px;">NOVA v3.2 [GEMINI 3]</span>
        <button onclick="toggleSettings()" style="background:#222; border:1px solid #444; color:white; padding:6px 12px; border-radius:6px; font-size:12px;">SETTINGS</button>
        <div id="settings-menu">
            <button onclick="clearHistory()" style="background:#ff4444; color:white; border:none; padding:10px; width:100%; border-radius:4px; font-weight:bold;">WIPE DATA</button>
        </div>
    </header>

    <div id="screen"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask Nova anything..." autocomplete="off">
        <button id="send">➤</button>
    </div>

    <script>
        const API_KEY = "AIzaSyAAob-TmIZDfZplzXqq1yb0WI_bCK8po4o"; // <--- YOUR KEY IS HERE
        const screen = document.getElementById('screen');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send');

        window.onload = () => {
            const logs = JSON.parse(localStorage.getItem('nova_2026_save')) || [];
            if (logs.length === 0) {
                appendMsg("<b>Nova:</b> System Re-linked. I am now running on the <b>Gemini 3 Flash</b> engine. Your Luau, Football, and Language data is ready.", 'nova');
            } else {
                logs.forEach(log => {
                    appendMsg(log.q, 'user');
                    appendMsg(`<b>Nova:</b> ${log.a}`, 'nova');
                });
            }
        };

        async function askNova() {
            const msg = userInput.value.trim();
            if (!msg) return;

            appendMsg(msg, 'user');
            userInput.value = '';
            const loading = appendMsg("Nova is analyzing via Gemini 3...", 'nova');

            try {
                // UPDATED MODEL NAME FOR 2026
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Nova, an AI teacher. Experts in Roblox Luau, Botola Pro Football, and Languages. If the user speaks Arabic, answer in Arabic. Current Question: ${msg}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    loading.innerHTML = `<b style="color:red;">API ERROR:</b> ${data.error.message}`;
                    return;
                }

                const answer = data.candidates[0].content.parts[0].text;
                const cleanAnswer = answer.replace(/\*/g, ""); // Remove markdown for speech
                
                loading.innerHTML = `<b>Nova:</b> ${answer} <br> <button class="speak-btn" onclick="speakText(\`${cleanAnswer.replace(/[`'"]/g, "")}\`)">🔊 HEAR LESSON</button>`;
                
                saveData(msg, answer);
            } catch (err) {
                loading.innerHTML = `<b style="color:red;">UPLINK FAILED:</b> Check internet connection.`;
            }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            const isArabic = /[\u0600-\u06FF]/.test(text);
            div.className = `bubble ${type} ${isArabic ? 'rtl' : ''}`;
            div.innerHTML = text;
            screen.appendChild(div);
            screen.scrollTop = screen.scrollHeight;
            return div;
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = /[\u0600-\u06FF]/.test(text) ? 'ar-SA' : 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function saveData(q, a) {
            let history = JSON.parse(localStorage.getItem('nova_2026_save')) || [];
            history.push({q, a});
            localStorage.setItem('nova_2026_save', JSON.stringify(history));
        }

        function toggleSettings() {
            const m = document.getElementById('settings-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function clearHistory() {
            if(confirm("Wipe all teacher memory?")) {
                localStorage.removeItem('nova_2026_save');
                location.reload();
            }
        }

        sendBtn.onclick = askNova;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') askNova(); };
    </script>
</body>
</html>
