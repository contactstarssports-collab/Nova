<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 4.0</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #050507; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; height: 100vh; }
        
        /* Sidebar & Navigation */
        #sidebar { width: 280px; background: #0a0a0c; border-right: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 20px; font-weight: bold; color: var(--cyan); border-bottom: 1px solid #222; font-size: 18px; }
        .nav-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 13px; color: #888; }
        .nav-item:hover { background: var(--glass); color: white; }
        
        /* Credits & Copyright Section */
        .credits-section { margin-top: auto; padding: 20px; border-top: 1px solid #222; background: #08080a; }
        .credits-text { font-size: 11px; color: #666; line-height: 1.6; }
        .ap-brand { color: var(--cyan); font-weight: bold; font-size: 12px; display: block; margin-bottom: 4px; }

        /* Main Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 14px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .nova { background: var(--glass); border-left: 3px solid var(--cyan); align-self: flex-start; }
        .user { background: #007aff; align-self: flex-end; }
        
        /* AI Disclaimer at bottom of chat */
        .disclaimer-bar { text-align: center; font-size: 10px; color: #555; padding: 10px; border-top: 1px solid #111; background: #050507; }

        /* Input Area */
        #input-area { padding: 15px; background: #0a0a0c; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #16161a; border: 1px solid #333; border-radius: 10px; padding: 12px; color: white; outline: none; }
        #send { background: var(--cyan); border: none; border-radius: 10px; width: 50px; font-weight: bold; cursor: pointer; }

        .code-block { background: #000; padding: 10px; border-radius: 5px; font-family: monospace; color: #0f0; margin: 10px 0; border: 1px solid #333; font-size: 13px; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">NOVA 4.0</div>
        <div class="nav-item">💬 Chat Sessions</div>
        <div class="nav-item">💻 Code Sandbox</div>
        <div class="nav-item" onclick="clearAll()" style="color: #ff4444;">Wipe Memory</div>
        
        <div class="credits-section">
            <span class="ap-brand">Ayham Projects (AP)</span>
            <div class="credits-text">
                Copyright 2026<br>
                Disclaimer: Nova is powered by Gemini 3
            </div>
        </div>
    </div>

    <div id="main">
        <div id="screen"></div>
        
        <div class="disclaimer-bar">
            Nova Is An AI It Can Make Mistakes Double Check For Important Things
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button id="send">></button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAAob-TmIZDfZplzXqq1yb0WI_bCK8po4o";
        const screen = document.getElementById('screen');
        const userInput = document.getElementById('user-input');

        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('nova_v4_history')) || [];
            if(history.length === 0) {
                appendMsg("System Online. NOVA 4.0 Ready.", 'nova');
            } else {
                history.forEach(h => {
                    appendMsg(h.q, 'user');
                    appendMsg(h.a, 'nova');
                });
            }
        };

        async function askNova() {
            const val = userInput.value.trim();
            if(!val) return;
            
            appendMsg(val, 'user');
            userInput.value = '';
            const loading = appendMsg("Analyzing...", 'nova');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Nova 4.0, an AI teacher. Experts in Roblox Luau and Football. If input is Arabic, reply in Arabic. Query: ${val}` }] }]
                    })
                });
                const data = await response.json();
                let answer = data.candidates[0].content.parts[0].text;
                
                // Format Code Blocks
                answer = answer.replace(/```(.*?)\n([\s\S]*?)```/g, '<div class="code-block">$2</div>');
                loading.innerHTML = `<b>Nova:</b><br>${answer}`;
                
                save(val, answer);
            } catch(e) { loading.innerText = "Connection Error."; }
        }

        function appendMsg(t, type) {
            const d = document.createElement('div');
            const isArabic = /[\u0600-\u06FF]/.test(t);
            d.className = `bubble ${type} ${isArabic ? 'rtl' : ''}`;
            d.innerHTML = t;
            screen.appendChild(d);
            screen.scrollTop = screen.scrollHeight;
            return d;
        }

        function save(q, a) {
            let h = JSON.parse(localStorage.getItem('nova_v4_history')) || [];
            h.push({q, a});
            localStorage.setItem('nova_v4_history', JSON.stringify(h));
        }

        function clearAll() { if(confirm("Wipe memory?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('send').onclick = askNova;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') askNova(); };
    </script>
</body>
</html>
